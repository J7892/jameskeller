<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copy Diff Checker 350p</title>
    <script src="https://cdn.jsdelivr.net/npm/diff@5.2.0/dist/diff.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 2rem auto;
            max-width: 1400px;
            padding: 0 1rem;
            background-color: #ffffff;
            color: #000000;
        }
        
        /* Input Layout */
        .input-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        textarea {
            width: 50%;
            height: 300px;
            padding: 1rem;
            font-family: monospace;
            font-size: 14px;
            border: 2px solid #000000;
            border-radius: 0;
            resize: vertical;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #000000;
        }
        .options {
            display: flex;
            gap: 2.5rem;
        }
        .option-group {
            display: flex;
            gap: 1rem;
            align-items: center;
            font-size: 14px;
        }
        .option-group strong {
            text-transform: uppercase;
            font-size: 12px;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
        }
        button {
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        button:hover {
            background-color: #ffffff;
            color: #000000;
        }
        
        /* General Output */
        #pdf-container {
            padding: 1rem;
            border: 2px solid #000000;
            min-height: 150px;
        }
        #output {
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        /* Inline Layout PDF Fixes */
        .diff-paragraph {
            page-break-inside: avoid; 
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 1.5em; 
            margin-bottom: 1em; 
        }

        /* Table Layout for Side-by-Side */
        .diff-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .diff-table tr {
            page-break-inside: avoid; 
        }
        .diff-table th {
            width: 50%;
            text-align: left;
            padding: 0.5rem;
            border-bottom: 2px solid #000000;
            text-transform: uppercase;
        }
        .diff-table td {
            width: 50%;
            padding: 0.5rem;
            vertical-align: top;
            border-right: 1px solid #e1e4e8;
        }
        .diff-table td:last-child {
            border-right: none;
        }
        .diff-table .empty {
            background-color: #f6f8fa; 
        }

        /* Colored Text Differences */
        .added { 
            background-color: #e6ffec; 
            color: #1a7f37; 
            font-weight: normal; 
        }
        .removed { 
            background-color: #ffebe9; 
            color: #cf222e; 
            text-decoration: line-through; 
            font-weight: normal; 
        }
        .unchanged { 
            color: #000000; 
            font-weight: normal;
        }
    </style>
</head>
<body>

    <h2>Copy Diff Checker</h2>
    
    <div class="input-container">
        <textarea id="original" placeholder="Paste original text here..."></textarea>
        <textarea id="modified" placeholder="Paste changed text here..."></textarea>
    </div>

    <div class="controls">
        <div class="options">
            <div class="option-group">
                <strong>View:</strong>
                <label>
                    <input type="radio" name="viewMode" value="inline" onchange="compareTexts()" checked> Inline
                </label>
                <label>
                    <input type="radio" name="viewMode" value="split" onchange="compareTexts()"> Side-by-Side
                </label>
            </div>
            
            <div class="option-group">
                <strong>Match:</strong>
                <label>
                    <input type="radio" name="matchMode" value="word" onchange="compareTexts()" checked> By Word
                </label>
                <label>
                    <input type="radio" name="matchMode" value="letter" onchange="compareTexts()"> By Letter
                </label>
            </div>
        </div>
        <div class="btn-group">
            <button onclick="compareTexts()">Compare Texts</button>
            <button onclick="exportToPDF()">Export to PDF</button>
        </div>
    </div>

    <div id="pdf-container">
        <div id="output">Results will appear here...</div>
    </div>

    <script>
        // Fix for the PDF generator dropping edge spaces
        function preserveSpaces(text) {
            if (!text) return text;
            return text.replace(/^ +/g, match => '\u00A0'.repeat(match.length))
                       .replace(/ +$/g, match => '\u00A0'.repeat(match.length));
        }

        // Helper function to score how similar two lines/paragraphs are for Side-by-Side alignment
        function getSimilarity(s1, s2) {
            const t1 = s1 ? s1.trim() : '';
            const t2 = s2 ? s2.trim() : '';
            
            // Fix: Blank lines are given a tiny score so they pair up if nothing else exists, 
            // but they will NEVER hijack the lookahead from actual text matches.
            if (!t1 && !t2) return 0.001; 
            if (!t1 || !t2) return 0;
            
            const w1 = t1.toLowerCase().split(/[\s,.-]+/);
            const w2 = t2.toLowerCase().split(/[\s,.-]+/);
            let matchCount = 0;
            const set2 = new Set(w2);
            for (const w of w1) {
                if (w && set2.has(w)) {
                    matchCount++;
                    set2.delete(w); 
                }
            }
            return matchCount / Math.max(w1.length, w2.length);
        }

        function compareTexts() {
            const originalText = document.getElementById('original').value;
            const modifiedText = document.getElementById('modified').value;
            const outputDiv = document.getElementById('output');
            
            const viewMode = document.querySelector('input[name="viewMode"]:checked').value;
            const matchMode = document.querySelector('input[name="matchMode"]:checked').value;
            
            outputDiv.innerHTML = '';
            outputDiv.className = ''; 

            if (!originalText && !modifiedText) {
                outputDiv.innerHTML = 'Results will appear here...';
                return;
            }

            const diffFn = matchMode === 'word' ? Diff.diffWords : Diff.diffChars;

            if (viewMode === 'inline') {
                const diffResults = diffFn(originalText, modifiedText);
                renderInline(diffResults, outputDiv);
            } else {
                const lineResults = Diff.diffLines(originalText, modifiedText);
                renderSplit(lineResults, outputDiv, diffFn);
            }
        }

        // UNTOUCHED INLINE MODE
        function renderInline(diffResults, container) {
            let currentParagraph = document.createElement('div');
            currentParagraph.className = 'diff-paragraph';
            container.appendChild(currentParagraph);

            diffResults.forEach((part) => {
                const chunks = part.value.replace(/\r/g, '').split(/\n{2,}/);
                
                chunks.forEach((chunk, index) => {
                    if (index > 0) {
                        currentParagraph = document.createElement('div');
                        currentParagraph.className = 'diff-paragraph';
                        container.appendChild(currentParagraph);
                    }
                    
                    if (chunk) {
                        const span = document.createElement('span');
                        if (part.added) span.className = 'added';
                        else if (part.removed) span.className = 'removed';
                        else span.className = 'unchanged';
                        
                        const flowingText = chunk.replace(/\n/g, ' ');
                        span.textContent = preserveSpaces(flowingText);
                        currentParagraph.appendChild(span);
                    }
                });
            });
        }

        function renderSplit(diffResults, container, diffFn) {
            const table = document.createElement('table');
            table.className = 'diff-table';
            const tbody = document.createElement('tbody');
            
            let i = 0;
            while (i < diffResults.length) {
                const part = diffResults[i];
                
                if (part.added || part.removed) {
                    let removedLines = [];
                    let addedLines = [];
                    
                    while (i < diffResults.length && (diffResults[i].added || diffResults[i].removed)) {
                        const lines = diffResults[i].value.replace(/\n$/, '').split('\n');
                        if (diffResults[i].removed) {
                            removedLines.push(...lines);
                        } else {
                            addedLines.push(...lines);
                        }
                        i++;
                    }
                    
                    let r = 0;
                    let a = 0;
                    
                    while (r < removedLines.length || a < addedLines.length) {
                        const tr = document.createElement('tr');
                        const tdLeft = document.createElement('td');
                        const tdRight = document.createElement('td');
                        
                        if (r >= removedLines.length) {
                            tdLeft.className = 'empty';
                            const span = document.createElement('span');
                            span.className = 'added';
                            span.textContent = preserveSpaces(addedLines[a]);
                            tdRight.appendChild(span);
                            a++;
                        } 
                        else if (a >= addedLines.length) {
                            const span = document.createElement('span');
                            span.className = 'removed';
                            span.textContent = preserveSpaces(removedLines[r]);
                            tdLeft.appendChild(span);
                            tdRight.className = 'empty';
                            r++;
                        } 
                        else {
                            let simHere = getSimilarity(removedLines[r], addedLines[a]);
                            
                            let bestFutureASim = -1;
                            for (let nextA = a + 1; nextA < addedLines.length; nextA++) {
                                let sim = getSimilarity(removedLines[r], addedLines[nextA]);
                                if (sim > bestFutureASim) bestFutureASim = sim;
                            }
                            
                            let bestFutureRSim = -1;
                            for (let nextR = r + 1; nextR < removedLines.length; nextR++) {
                                let sim = getSimilarity(removedLines[nextR], addedLines[a]);
                                if (sim > bestFutureRSim) bestFutureRSim = sim;
                            }

                            if (simHere >= bestFutureASim && simHere >= bestFutureRSim) {
                                const innerDiff = diffFn(removedLines[r], addedLines[a]);
                                
                                innerDiff.forEach(innerPart => {
                                    if (innerPart.removed) {
                                        const span = document.createElement('span');
                                        span.className = 'removed';
                                        span.textContent = preserveSpaces(innerPart.value);
                                        tdLeft.appendChild(span);
                                    } else if (innerPart.added) {
                                        const span = document.createElement('span');
                                        span.className = 'added';
                                        span.textContent = preserveSpaces(innerPart.value);
                                        tdRight.appendChild(span);
                                    } else {
                                        tdLeft.appendChild(document.createTextNode(preserveSpaces(innerPart.value)));
                                        tdRight.appendChild(document.createTextNode(preserveSpaces(innerPart.value)));
                                    }
                                });
                                r++;
                                a++;
                            } 
                            else if (bestFutureASim > bestFutureRSim) {
                                tdLeft.className = 'empty';
                                const span = document.createElement('span');
                                span.className = 'added';
                                span.textContent = preserveSpaces(addedLines[a]);
                                tdRight.appendChild(span);
                                a++;
                            } 
                            else {
                                const span = document.createElement('span');
                                span.className = 'removed';
                                span.textContent = preserveSpaces(removedLines[r]);
                                tdLeft.appendChild(span);
                                tdRight.className = 'empty';
                                r++;
                            }
                        }
                        
                        tr.appendChild(tdLeft);
                        tr.appendChild(tdRight);
                        tbody.appendChild(tr);
                    }
                } else {
                    const lines = diffResults[i].value.replace(/\n$/, '').split('\n');
                    lines.forEach(line => {
                        const tr = document.createElement('tr');
                        const tdLeft = document.createElement('td');
                        const tdRight = document.createElement('td');
                        
                        tdLeft.textContent = preserveSpaces(line);
                        tdRight.textContent = preserveSpaces(line);
                        
                        tr.appendChild(tdLeft);
                        tr.appendChild(tdRight);
                        tbody.appendChild(tr);
                    });
                    i++;
                }
            }
            
            table.appendChild(tbody);
            container.appendChild(table);
        }

        function exportToPDF() {
            const element = document.getElementById('pdf-container');
            element.style.border = 'none';

            const opt = {
                margin:       0.5,
                filename:     'text-comparison.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, scrollY: 0, windowY: 0 },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' },
                pagebreak:    { mode: ['css', 'legacy'] } 
            };
            html2pdf().set(opt).from(element).save().then(() => {
                element.style.border = ''; 
            });
        }
    </script>
</body>
</html>
