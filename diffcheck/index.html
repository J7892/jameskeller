<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copy Diff Checker</title>
    <script src="https://cdn.jsdelivr.net/npm/diff@5.2.0/dist/diff.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 2rem auto;
            max-width: 1400px;
            padding: 0 1rem;
            background-color: #ffffff;
            color: #000000;
        }
        
        /* Input Layout */
        .input-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        textarea {
            width: 50%;
            height: 300px;
            padding: 1rem;
            font-family: monospace;
            font-size: 14px;
            border: 2px solid #000000;
            border-radius: 0;
            resize: vertical;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #000000;
        }
        .options {
            display: flex;
            gap: 2.5rem;
        }
        .option-group {
            display: flex;
            gap: 1rem;
            align-items: center;
            font-size: 14px;
        }
        .option-group strong {
            text-transform: uppercase;
            font-size: 12px;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
        }
        button {
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            transition: opacity 0.2s;
        }
        button:hover {
            background-color: #ffffff;
            color: #000000;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* General Output */
        #pdf-container {
            padding: 1rem;
            border: 2px solid #000000;
            min-height: 150px;
        }
        #output {
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        /* Inline Layout PDF Fixes */
        .diff-paragraph {
            page-break-inside: avoid; 
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 1.5em; 
            margin-bottom: 1em; 
        }

        /* Table Layout for Side-by-Side */
        .diff-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .diff-table tr {
            page-break-inside: avoid; 
        }
        .diff-table th {
            width: 50%;
            text-align: left;
            padding: 0.5rem;
            border-bottom: 2px solid #000000;
            text-transform: uppercase;
        }
        .diff-table td {
            width: 50%;
            padding: 0.5rem;
            vertical-align: top;
            border-right: 1px solid #e1e4e8;
        }
        .diff-table td:last-child {
            border-right: none;
        }
        .diff-table .empty {
            background-color: #f6f8fa; 
        }

        /* Colored Text Differences */
        .added { 
            background-color: #e6ffec; 
            color: #1a7f37; 
            font-weight: normal; 
        }
        .removed { 
            background-color: #ffebe9; 
            color: #cf222e; 
            text-decoration: line-through; 
            font-weight: normal; 
        }
        .unchanged { 
            color: #000000; 
            font-weight: normal;
        }

        /* Stats Section */
        .stats-container {
            display: none; /* Hidden until texts are compared */
            gap: 3rem;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 2px solid #000000;
            font-family: monospace;
            font-size: 14px;
        }
        .stat-positive {
            color: #1a7f37;
            font-weight: bold;
        }
        .stat-negative {
            color: #cf222e;
            font-weight: bold;
        }
        .stat-neutral {
            color: #000000;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <h2>Copy Diff Checker</h2>
    
    <div class="input-container">
        <textarea id="original" placeholder="Paste original text here..."></textarea>
        <textarea id="modified" placeholder="Paste changed text here..."></textarea>
    </div>

    <div class="controls">
        <div class="options">
            <div class="option-group">
                <strong>View:</strong>
                <label>
                    <input type="radio" name="viewMode" value="inline" onchange="compareTexts()" checked> Inline
                </label>
                <label>
                    <input type="radio" name="viewMode" value="split" onchange="compareTexts()"> Side-by-Side
                </label>
            </div>
            
            <div class="option-group">
                <strong>Match:</strong>
                <label>
                    <input type="radio" name="matchMode" value="word" onchange="compareTexts()" checked> By Word
                </label>
                <label>
                    <input type="radio" name="matchMode" value="letter" onchange="compareTexts()"> By Letter
                </label>
            </div>
        </div>
        <div class="btn-group">
            <button onclick="compareTexts()">Compare Texts</button>
            <button id="exportBtn" onclick="exportToPDF()">Export to PDF</button>
        </div>
    </div>

    <div id="pdf-container">
        <div id="output">Results will appear here...</div>
        
        <div id="stats-container" class="stats-container">
            <div class="stat-box">
                <strong>Words:</strong> <span id="word-count">0 &rarr; 0</span> <span id="word-diff"></span>
            </div>
            <div class="stat-box">
                <strong>Characters:</strong> <span id="char-count">0 &rarr; 0</span> <span id="char-diff"></span>
            </div>
        </div>
    </div>

    <script>
        function preserveSpaces(text) {
            if (!text) return text;
            return text.replace(/^ +/g, match => '\u00A0'.repeat(match.length))
                       .replace(/ +$/g, match => '\u00A0'.repeat(match.length));
        }

        function appendSafeSpans(container, text, className) {
            if (!text) return;
            const processedText = preserveSpaces(text);
            const chunks = processedText.split(/([ \t\n]+)/);
            
            chunks.forEach(chunk => {
                if (!chunk) return;
                const span = document.createElement('span');
                if (className) span.className = className;
                span.textContent = chunk;
                container.appendChild(span);
            });
        }

        function getSimilarity(s1, s2) {
            const t1 = s1 ? s1.trim() : '';
            const t2 = s2 ? s2.trim() : '';
            
            if (!t1 && !t2) return 1.0; 
            if (!t1 || !t2) return 0.0; 
            
            const w1 = t1.toLowerCase().split(/[\s,.-]+/);
            const w2 = t2.toLowerCase().split(/[\s,.-]+/);
            let matchCount = 0;
            const set2 = new Set(w2);
            for (const w of w1) {
                if (w && set2.has(w)) {
                    matchCount++;
                    set2.delete(w); 
                }
            }
            return matchCount / Math.max(w1.length, w2.length);
        }

        function applyInnerDiff(rLine, aLine, tdLeft, tdRight, diffFn) {
            const innerDiff = diffFn(rLine, aLine);
            innerDiff.forEach(innerPart => {
                if (innerPart.removed) {
                    appendSafeSpans(tdLeft, innerPart.value, 'removed');
                } else if (innerPart.added) {
                    appendSafeSpans(tdRight, innerPart.value, 'added');
                } else {
                    appendSafeSpans(tdLeft, innerPart.value, 'unchanged');
                    appendSafeSpans(tdRight, innerPart.value, 'unchanged');
                }
            });
        }

        function updateStats(originalText, modifiedText) {
            const statsContainer = document.getElementById('stats-container');
            
            if (!originalText && !modifiedText) {
                statsContainer.style.display = 'none';
                return;
            }

            statsContainer.style.display = 'flex';

            // Character count
            const origChars = originalText.length;
            const modChars = modifiedText.length;
            const charDiff = modChars - origChars;

            // Word count
            const origWords = originalText.trim() ? originalText.trim().split(/\s+/).length : 0;
            const modWords = modifiedText.trim() ? modifiedText.trim().split(/\s+/).length : 0;
            const wordDiff = modWords - origWords;

            document.getElementById('word-count').innerHTML = `${origWords} &rarr; ${modWords}`;
            document.getElementById('char-count').innerHTML = `${origChars} &rarr; ${modChars}`;

            const wordDiffEl = document.getElementById('word-diff');
            if (wordDiff > 0) {
                wordDiffEl.textContent = `(+${wordDiff})`;
                wordDiffEl.className = 'stat-positive';
            } else if (wordDiff < 0) {
                wordDiffEl.textContent = `(${wordDiff})`;
                wordDiffEl.className = 'stat-negative';
            } else {
                wordDiffEl.textContent = `(0)`;
                wordDiffEl.className = 'stat-neutral';
            }

            const charDiffEl = document.getElementById('char-diff');
            if (charDiff > 0) {
                charDiffEl.textContent = `(+${charDiff})`;
                charDiffEl.className = 'stat-positive';
            } else if (charDiff < 0) {
                charDiffEl.textContent = `(${charDiff})`;
                charDiffEl.className = 'stat-negative';
            } else {
                charDiffEl.textContent = `(0)`;
                charDiffEl.className = 'stat-neutral';
            }
        }

        function compareTexts() {
            const originalText = document.getElementById('original').value;
            const modifiedText = document.getElementById('modified').value;
            const outputDiv = document.getElementById('output');
            const statsContainer = document.getElementById('stats-container');
            
            const viewMode = document.querySelector('input[name="viewMode"]:checked').value;
            const matchMode = document.querySelector('input[name="matchMode"]:checked').value;
            
            outputDiv.innerHTML = '';
            outputDiv.className = ''; 

            if (!originalText && !modifiedText) {
                outputDiv.innerHTML = 'Results will appear here...';
                statsContainer.style.display = 'none';
                return;
            }

            updateStats(originalText, modifiedText);

            const diffFn = matchMode === 'word' ? Diff.diffWords : Diff.diffChars;

            if (viewMode === 'inline') {
                const diffResults = diffFn(originalText, modifiedText);
                renderInline(diffResults, outputDiv);
            } else {
                renderSplit(originalText, modifiedText, outputDiv, diffFn);
            }
        }

        function renderInline(diffResults, container) {
            let currentParagraph = document.createElement('div');
            currentParagraph.className = 'diff-paragraph';
            container.appendChild(currentParagraph);

            diffResults.forEach((part) => {
                const chunks = part.value.replace(/\r/g, '').split(/\n{2,}/);
                
                chunks.forEach((chunk, index) => {
                    if (index > 0) {
                        currentParagraph = document.createElement('div');
                        currentParagraph.className = 'diff-paragraph';
                        container.appendChild(currentParagraph);
                    }
                    
                    if (chunk) {
                        const className = part.added ? 'added' : (part.removed ? 'removed' : 'unchanged');
                        const flowingText = chunk.replace(/\n/g, ' ');
                        appendSafeSpans(currentParagraph, flowingText, className);
                    }
                });
            });
        }

        function renderSplit(origText, modText, container, diffFn) {
            const table = document.createElement('table');
            table.className = 'diff-table';
            const tbody = document.createElement('tbody');
            
            const origParas = origText.split(/\n\s*\n/).map(p => p.trim()).filter(p => p.length > 0);
            const modParas = modText.split(/\n\s*\n/).map(p => p.trim()).filter(p => p.length > 0);
            
            const diffBlocks = Diff.diffArrays(origParas, modParas);
            
            let i = 0;
            while (i < diffBlocks.length) {
                const part = diffBlocks[i];
                
                if (part.added || part.removed) {
                    let removedParas = [];
                    let addedParas = [];
                    
                    while (i < diffBlocks.length && (diffBlocks[i].added || diffBlocks[i].removed)) {
                        if (diffBlocks[i].removed) {
                            removedParas.push(...diffBlocks[i].value);
                        } else {
                            addedParas.push(...diffBlocks[i].value);
                        }
                        i++;
                    }
                    
                    let r = 0;
                    let a = 0;
                    
                    while (r < removedParas.length || a < addedParas.length) {
                        const tr = document.createElement('tr');
                        const tdLeft = document.createElement('td');
                        const tdRight = document.createElement('td');
                        
                        if (r >= removedParas.length) {
                            tdLeft.className = 'empty';
                            appendSafeSpans(tdRight, addedParas[a], 'added');
                            a++;
                        } 
                        else if (a >= addedParas.length) {
                            appendSafeSpans(tdLeft, removedParas[r], 'removed');
                            tdRight.className = 'empty';
                            r++;
                        } 
                        else {
                            let simHere = getSimilarity(removedParas[r], addedParas[a]);
                            
                            let bestFutureASim = -1;
                            for (let nextA = a + 1; nextA < addedParas.length; nextA++) {
                                let sim = getSimilarity(removedParas[r], addedParas[nextA]);
                                if (sim > bestFutureASim) bestFutureASim = sim;
                            }
                            
                            let bestFutureRSim = -1;
                            for (let nextR = r + 1; nextR < removedParas.length; nextR++) {
                                let sim = getSimilarity(removedParas[nextR], addedParas[a]);
                                if (sim > bestFutureRSim) bestFutureRSim = sim;
                            }

                            if (simHere >= bestFutureASim && simHere >= bestFutureRSim) {
                                applyInnerDiff(removedParas[r], addedParas[a], tdLeft, tdRight, diffFn);
                                r++; a++;
                            } 
                            else if (bestFutureASim > bestFutureRSim) {
                                tdLeft.className = 'empty';
                                appendSafeSpans(tdRight, addedParas[a], 'added');
                                a++;
                            } 
                            else {
                                appendSafeSpans(tdLeft, removedParas[r], 'removed');
                                tdRight.className = 'empty';
                                r++;
                            }
                        }
                        
                        tr.appendChild(tdLeft);
                        tr.appendChild(tdRight);
                        tbody.appendChild(tr);
                    }
                } else {
                    part.value.forEach(para => {
                        const tr = document.createElement('tr');
                        const tdLeft = document.createElement('td');
                        const tdRight = document.createElement('td');
                        
                        appendSafeSpans(tdLeft, para, 'unchanged');
                        appendSafeSpans(tdRight, para, 'unchanged');
                        
                        tr.appendChild(tdLeft);
                        tr.appendChild(tdRight);
                        tbody.appendChild(tr);
                    });
                    i++;
                }
            }
            
            table.appendChild(tbody);
            container.appendChild(table);
        }

        function exportToPDF() {
            const btn = document.getElementById('exportBtn');
            const originalBtnText = btn.textContent;
            btn.textContent = 'Generating PDF...';
            btn.disabled = true;

            const element = document.getElementById('pdf-container');
            const viewMode = document.querySelector('input[name="viewMode"]:checked').value;
            const isSplit = viewMode === 'split';

            const originalBorder = element.style.border;
            const originalWidth = element.style.width;
            const originalMaxWidth = element.style.maxWidth;

            element.style.border = 'none';
            element.style.width = isSplit ? '1050px' : '800px';
            element.style.maxWidth = 'none';

            const opt = {
                margin:       0.5,
                filename:     'text-comparison.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, scrollY: 0, windowY: 0 },
                jsPDF:        { 
                    unit: 'in', 
                    format: 'letter', 
                    orientation: isSplit ? 'landscape' : 'portrait' 
                },
                pagebreak:    { mode: ['css', 'legacy'] } 
            };

            setTimeout(() => {
                html2pdf().set(opt).from(element).save().then(() => {
                    element.style.border = originalBorder;
                    element.style.width = originalWidth;
                    element.style.maxWidth = originalMaxWidth;
                    
                    btn.textContent = originalBtnText;
                    btn.disabled = false;
                });
            }, 100);
        }
    </script>
</body>
</html>
