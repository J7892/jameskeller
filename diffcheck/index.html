        }
        .options {
            display: flex;

        }
        .option-group {

        button:hover {

        .diff-paragraph {
            page-break-inside: avoid;

            word-break: break-word;

        }

        .diff-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .diff-table tr {
            page-break-inside: avoid; 
        }
        .diff-table th {
            width: 50%;
            text-align: left;
            padding: 0.5rem;
            border-bottom: 2px solid #000000;
            text-transform: uppercase;
        }
        .diff-table td {
            width: 50%;
            padding: 0.5rem;
            vertical-align: top;
            border-right: 1px solid #e1e4e8;
        }
        .diff-table td:last-child {
            border-right: none;
        }
        .diff-table .empty {
            background-color: #f6f8fa; 
        }
