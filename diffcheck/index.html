<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Text Diff</title>
    <script src="https://cdn.jsdelivr.net/npm/diff@5.2.0/dist/diff.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 2rem auto;
            max-width: 1400px;
            padding: 0 1rem;
            background-color: #ffffff;
            color: #000000;
        }
        .input-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        textarea {
            width: 50%;
            height: 300px;
            padding: 1rem;
            font-family: monospace;
            font-size: 14px;
            border: 2px solid #000000;
            border-radius: 0;
            resize: vertical;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #000000;
        }
        .options {
            display: flex;
            gap: 1.5rem;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
        }
        button {
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        button:hover {
            background-color: #ffffff;
            color: #000000;
        }
        
        /* General Output */
        #pdf-container {
            padding: 1rem;
            border: 2px solid #000000;
            min-height: 150px;
        }
        #output {
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        /* Inline Layout PDF Fixes */
        .diff-paragraph {
            page-break-inside: avoid; /* Prevents PDF from cutting the paragraph in half */
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 1.5em; /* Ensures empty newlines still take up space */
        }

        /* Table Layout for Side-by-Side */
        .diff-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .diff-table tr {
            page-break-inside: avoid; /* Prevents PDF from cutting rows in half */
        }
        .diff-table th {
            width: 50%;
            text-align: left;
            padding: 0.5rem;
            border-bottom: 2px solid #000000;
            text-transform: uppercase;
        }
        .diff-table td {
            width: 50%;
            padding: 0.5rem;
            vertical-align: top;
            border-right: 1px solid #e1e4e8;
        }
        .diff-table td:last-child {
            border-right: none;
        }
        .diff-table .empty {
            background-color: #f6f8fa; 
        }

        /* Colored Text Differences */
        .added { 
            background-color: #e6ffec; 
            color: #1a7f37; 
            font-weight: bold; 
        }
        .removed { 
            background-color: #ffebe9; 
            color: #cf222e; 
            text-decoration: line-through; 
        }
        .unchanged { 
            color: #000000; 
        }
    </style>
</head>
<body>

    <h2>Private Text Comparator</h2>
    
    <div class="input-container">
        <textarea id="original" placeholder="Original text..."></textarea>
        <textarea id="modified" placeholder="Modified text..."></textarea>
    </div>

    <div class="controls">
        <div class="options">
            <label>
                <input type="radio" name="viewMode" value="inline" onchange="compareTexts()" checked> Inline View
            </label>
            <label>
                <input type="radio" name="viewMode" value="split" onchange="compareTexts()"> Side-by-Side
            </label>
        </div>
        <div class="btn-group">
            <button onclick="compareTexts()">Compare Texts</button>
            <button onclick="exportToPDF()">Export to PDF</button>
        </div>
    </div>

    <div id="pdf-container">
        <div id="output">Results will appear here...</div>
    </div>

    <script>
        function compareTexts() {
            const originalText = document.getElementById('original').value;
            const modifiedText = document.getElementById('modified').value;
            const outputDiv = document.getElementById('output');
            const viewMode = document.querySelector('input[name="viewMode"]:checked').value;
            
            outputDiv.innerHTML = '';
            outputDiv.className = ''; 

            if (!originalText && !modifiedText) {
                outputDiv.innerHTML = 'Results will appear here...';
                return;
            }

            if (viewMode === 'inline') {
                const diffResults = Diff.diffWords(originalText, modifiedText);
                renderInline(diffResults, outputDiv);
            } else {
                const diffResults = Diff.diffLines(originalText, modifiedText);
                renderSplit(diffResults, outputDiv);
            }
        }

        function renderInline(diffResults, container) {
            // Create the first paragraph container
            let currentParagraph = document.createElement('div');
            currentParagraph.className = 'diff-paragraph';
            container.appendChild(currentParagraph);

            diffResults.forEach((part) => {
                // Split the text block by newlines to catch paragraph breaks
                const lines = part.value.split('\n');
                
                lines.forEach((line, index) => {
                    // If we hit a newline, create a new paragraph block
                    if (index > 0) {
                        currentParagraph = document.createElement('div');
                        currentParagraph.className = 'diff-paragraph';
                        container.appendChild(currentParagraph);
                    }
                    
                    if (line) {
                        const span = document.createElement('span');
                        if (part.added) span.className = 'added';
                        else if (part.removed) span.className = 'removed';
                        else span.className = 'unchanged';
                        
                        span.appendChild(document.createTextNode(line));
                        currentParagraph.appendChild(span);
                    }
                });
            });
        }

        function renderSplit(diffResults, container) {
            const table = document.createElement('table');
            table.className = 'diff-table';
            
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            headerRow.innerHTML = '<th>Original (Deletions)</th><th>Modified (Additions)</th>';
            thead.appendChild(headerRow);
            table.appendChild(thead);
            
            const tbody = document.createElement('tbody');
            
            let i = 0;
            while (i < diffResults.length) {
                const part = diffResults[i];
                
                if (part.removed && i + 1 < diffResults.length && diffResults[i+1].added) {
                    const addedPart = diffResults[i+1];
                    const removedLines = part.value.replace(/\n$/, '').split('\n');
                    const addedLines = addedPart.value.replace(/\n$/, '').split('\n');
                    const maxLines = Math.max(removedLines.length, addedLines.length);
                    
                    for (let j = 0; j < maxLines; j++) {
                        const tr = document.createElement('tr');
                        
                        const tdLeft = document.createElement('td');
                        if (j < removedLines.length) {
                            tdLeft.className = 'removed';
                            tdLeft.textContent = removedLines[j];
                        } else {
                            tdLeft.className = 'empty';
                        }
                        
                        const tdRight = document.createElement('td');
                        if (j < addedLines.length) {
                            tdRight.className = 'added';
                            tdRight.textContent = addedLines[j];
                        } else {
                            tdRight.className = 'empty';
                        }
                        
                        tr.appendChild(tdLeft);
                        tr.appendChild(tdRight);
                        tbody.appendChild(tr);
                    }
                    i += 2; 
                } else {
                    const lines = part.value.replace(/\n$/, '').split('\n');
                    lines.forEach(line => {
                        const tr = document.createElement('tr');
                        const tdLeft = document.createElement('td');
                        const tdRight = document.createElement('td');
                        
                        if (part.added) {
                            tdLeft.className = 'empty'; 
                            tdRight.className = 'added';
                            tdRight.textContent = line;
                        } else if (part.removed) {
                            tdLeft.className = 'removed';
                            tdLeft.textContent = line;
                            tdRight.className = 'empty'; 
                        } else {
                            tdLeft.className = 'unchanged';
                            tdLeft.textContent = line;
                            tdRight.className = 'unchanged';
                            tdRight.textContent = line;
                        }
                        
                        tr.appendChild(tdLeft);
                        tr.appendChild(tdRight);
                        tbody.appendChild(tr);
                    });
                    i++;
                }
            }
            
            table.appendChild(tbody);
            container.appendChild(table);
        }

        function exportToPDF() {
            const element = document.getElementById('pdf-container');
            const opt = {
                margin:       0.5,
                filename:     'text-comparison.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' },
                // This explicitly tells the PDF library to respect the CSS page-break rules we added
                pagebreak:    { mode: ['css', 'legacy'] } 
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
