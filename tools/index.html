<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #2563eb;
            --gray: #f8fafc;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            margin: 0;
            display: flex;
            justify-content: center;
            padding-top: 10vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        header {
            margin-bottom: 32px;
            border-bottom: 2px solid var(--text);
            padding-bottom: 12px;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tool-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tool-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: var(--gray);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .tool-link:hover {
            border-color: var(--text);
            background: #fff;
            transform: translateX(4px);
        }

        .tool-link span {
            font-size: 0.9rem;
            opacity: 0.5;
        }

        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <nav class="tool-grid">
            <a href="/notes/" class="tool-link">
                Notes <span>/notes/</span>
            </a>
            <a href="/diffchecker/" class="tool-link">
                Diff Checker <span>/diffchecker/</span>
            </a>
            <a href="/wordcount/" class="tool-link">
                Word Counter <span>/wordcount/</span>
            </a>
        </nav>

    </div>

</body>
</html>
