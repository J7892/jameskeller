<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolbox</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-color: #333;
            --accent-color: #007aff;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .tool-list {
            display: grid;
            gap: 16px;
        }

        .tool-card {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            display: block;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .tool-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            color: var(--accent-color);
        }

        footer {
            margin-top: 30px;
            font-size: 0.85rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Personal Tools</h1>
        
        <div class="tool-list">
            <a href="/notes/" class="tool-card">📝 Notes</a>
            <a href="/diffchecker/" class="tool-card">🔍 Diff Checker</a>
            <a href="/wordcount/" class="tool-card">🔢 Word Counter</a>
        </div>

        <footer>
            &copy; 2026
        </footer>
    </div>

</body>
</html>
