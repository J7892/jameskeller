<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Notes</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { display: flex; gap: 20px; max-width: 1000px; margin: auto; height: 80vh; }
        
        /* Sidebar Styles */
        .sidebar { width: 30%; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .note-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .note-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; }
        .note-item:hover { background: #f0f0f0; }

        /* Editor Styles */
        .editor-area { width: 70%; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        #editor-container { flex-grow: 1; height: 300px; }
        input#note-title { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1.2em; }
        .controls { margin-top: 10px; display: flex; gap: 10px; }
        
        button { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-save { background: #28a745; color: white; }
        .btn-new { background: #007bff; color: white; width: 100%; margin-bottom: 10px; }
        .btn-delete { background: #dc3545; color: white; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <button class="btn-new" onclick="createNewNote()">+ New Note</button>
        <div id="note-list" class="note-list"></div>
    </div>

    <div class="editor-area">
        <input type="text" id="note-title" placeholder="Note Title...">
        <div id="editor-container"></div>
        <div class="controls">
            <button class="btn-save" onclick="saveNote()">Save Note</button>
        </div>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
    // Initialize Quill Editor with Bold, Italic, and Size options
    var quill = new Quill('#editor-container', {
        modules: {
            toolbar: [
                [{ 'size': ['small', false, 'large', 'huge'] }],
                ['bold', 'italic', 'underline'],
                ['clean']
            ]
        },
        theme: 'snow'
    });

    let currentNoteId = null;

    // Load notes from LocalStorage on startup
    window.onload = () => {
        renderNoteList();
    };

    function saveNote() {
        const title = document.getElementById('note-title').value || "Untitled Note";
        const content = quill.getContents(); // Saves as JSON delta
        const notes = JSON.parse(localStorage.getItem('my-github-notes') || '[]');

        if (currentNoteId !== null) {
            // Update existing
            const index = notes.findIndex(n => n.id === currentNoteId);
            notes[index] = { id: currentNoteId, title, content, date: new Date() };
        } else {
            // Create new
            const newNote = {
                id: Date.now(),
                title,
                content,
                date: new Date()
            };
            notes.push(newNote);
            currentNoteId = newNote.id;
        }

        localStorage.setItem('my-github-notes', JSON.stringify(notes));
        renderNoteList();
        alert("Note saved locally!");
    }

    function renderNoteList() {
        const notes = JSON.parse(localStorage.getItem('my-github-notes') || '[]');
        const listContainer = document.getElementById('note-list');
        listContainer.innerHTML = '';

        notes.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(note => {
            const div = document.createElement('div');
            div.className = 'note-item';
            div.innerHTML = `
                <span onclick="loadNote(${note.id})">${note.title}</span>
                <button class="btn-delete" onclick="deleteNote(${note.id})">X</button>
            `;
            listContainer.appendChild(div);
        });
    }

    function loadNote(id) {
        const notes = JSON.parse(localStorage.getItem('my-github-notes') || '[]');
        const note = notes.find(n => n.id === id);
        if (note) {
            currentNoteId = note.id;
            document.getElementById('note-title').value = note.title;
            quill.setContents(note.content);
        }
    }

    function createNewNote() {
        currentNoteId = null;
        document.getElementById('note-title').value = '';
        quill.setContents([]);
    }

    function deleteNote(id) {
        if (confirm("Delete this note?")) {
            let notes = JSON.parse(localStorage.getItem('my-github-notes') || '[]');
            notes = notes.filter(n => n.id !== id);
            localStorage.setItem('my-github-notes', JSON.stringify(notes));
            if (currentNoteId === id) createNewNote();
            renderNoteList();
        }
    }
</script>

</body>
</html>
