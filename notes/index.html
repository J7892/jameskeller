<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
        .main-wrapper { display: flex; flex-grow: 1; overflow: hidden; position: relative; }
        
        /* Sidebar - Collapsed by default */
        .sidebar { width: 280px; background: white; padding: 15px; border-right: 1px solid #ddd; display: flex; flex-direction: column; transition: margin-left 0.3s ease; z-index: 10; margin-left: -310px; }
        .sidebar.open { margin-left: 0; }
        
        .note-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .note-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.9em; }
        .note-item:hover { background: #f0f0f0; }

        /* Editor Area */
        .editor-area { flex-grow: 1; background: white; padding: 20px; display: flex; flex-direction: column; position: relative; overflow-y: auto; }
        #editor-container { flex-grow: 1; font-size: 16px; }
        .ql-editor p { margin-bottom: 1.5em !important; } 

        /* Header Controls */
        .header-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; margin-left: 40px; }
        input#note-title { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1.4em; font-weight: bold; outline: none; }
        
        /* Buttons */
        button { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; }
        .btn-new-main { background: #007bff; color: white; font-size: 1.2em; padding: 5px 15px; }
        .btn-new-sidebar { background: #007bff; color: white; margin-bottom: 10px; width: 100%; }
        .btn-export { background: #6c757d; color: white; margin-top: 10px; font-size: 0.8em; }
        .btn-delete { background: #ff4d4d; color: white; padding: 2px 8px; border-radius: 3px; }
        
        .toggle-sidebar { background: #333; color: white; padding: 5px 12px; cursor: pointer; border-radius: 0 4px 4px 0; position: absolute; left: 0; top: 10px; z-index: 100; border: none; }

        .bottom-bar { margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; padding-top: 10px; margin-left: 40px; }
        .save-status { font-size: 0.85em; color: #28a745; font-weight: 600; }
        .shortcut-info { font-size: 0.8em; color: #777; }

        /* Custom Highlight Button Styling */
        .ql-highlight:after { content: "H"; background: #ffff00; padding: 0 4px; border-radius: 2px; border: 1px solid #ccc; font-weight: bold; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div id="sidebar" class="sidebar">
        <button class="btn-new-sidebar" onclick="createNewNote()">+ New Note</button>
        <div id="note-list" class="note-list"></div>
        <button class="btn-export" onclick="exportNotes()">Download Backup (JSON)</button>
    </div>

    <div class="editor-area">
        <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
        
        <div class="header-controls">
            <input type="text" id="note-title" placeholder="Note Title..." oninput="handleInput()">
            <button class="btn-new-main" onclick="createNewNote()" title="New Note">+</button>
        </div>

        <div id="editor-container" style="margin-left: 40px;"></div>

        <div class="bottom-bar">
            <span id="status" class="save-status">Saved</span>
            <div class="shortcut-info">
                Highlight: <strong>Cmd/Ctrl+Shift+K</strong>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
    const highlightHandler = function() {
        const range = quill.getSelection();
        if (!range) return;
        const format = quill.getFormat(range);
        quill.format('background', format.background ? false : '#ffff00');
    };

    var quill = new Quill('#editor-container', {
        modules: {
            toolbar: {
                container: [
                    [{ 'size': ['small', false, 'large', 'huge'] }],
                    ['bold', 'italic', 'underline'],
                    ['highlight'], 
                    [{ 'background': ['#ffff00', '#ced4da', '#d4edda', '#f8d7da', false] }], 
                    [{ 'color': [] }],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['clean']
                ],
                handlers: { 'highlight': highlightHandler }
            },
            keyboard: {
                bindings: {
                    highlightShortcut: { key: 'K', shortKey: true, shiftKey: true, handler: highlightHandler }
                }
            }
        },
        theme: 'snow'
    });

    let currentNoteId = null;
    let saveTimeout = null;

    window.onload = () => { renderNoteList(); };

    function toggleSidebar() { 
        document.getElementById('sidebar').classList.toggle('open'); 
    }

    function handleInput() {
        document.getElementById('status').innerText = "Saving...";
        document.getElementById('status').style.color = "#ff9800";
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(autoSave, 1000);
    }

    quill.on('text-change', (delta, oldDelta, source) => {
        if (source === 'user') handleInput();
    });

    function autoSave() {
        const title = document.getElementById('note-title').value || "Untitled Note";
        const content = quill.getContents();
        let notes = JSON.parse(localStorage.getItem('my-github-notes') || '[]');

        if (currentNoteId !== null) {
            const index = notes.findIndex(n => n.id === currentNoteId);
            if (index > -1) notes[index] = { id: currentNoteId, title, content, date: new Date() };
        } else {
            const newNote = { id: Date.now(), title, content, date: new Date() };
            notes.push(newNote);
            currentNoteId = newNote.id;
        }

        localStorage.setItem('my-github-notes', JSON.stringify(notes));
        renderNoteList();
        
        const status = document.getElementById('status');
        status.innerText = "Saved";
        status.style.color = "#28a745";
    }

    function renderNoteList() {
        const notes = JSON.parse(localStorage.getItem('my-github-notes') || '[]');
        const listContainer = document.getElementById('note-list');
        listContainer.innerHTML = '';
        notes.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(note => {
            const div = document.createElement('div');
            div.className = 'note-item';
            div.innerHTML = `<span style="flex-grow:1; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;" onclick="loadNote(${note.id})">${note.title}</span><button class="btn-delete" onclick="deleteNote(${note.id})">×</button>`;
            listContainer.appendChild(div);
        });
    }

    function loadNote(id) {
        const notes = JSON.parse(localStorage.getItem('my-github-notes') || '[]');
        const note = notes.find(n => n.id === id);
        if (note) {
            currentNoteId = note.id;
            document.getElementById('note-title').value = note.title;
            quill.setContents(note.content);
            document.getElementById('status').innerText = "Saved";
            // Auto-close sidebar on mobile/small screens if you prefer, 
            // but for now keeping it manual.
        }
    }

    function createNewNote() {
        currentNoteId = null;
        document.getElementById('note-title').value = '';
        quill.setContents([]);
        document.getElementById('status').innerText = "New Note";
        document.getElementById('note-title').focus();
    }

    function deleteNote(id) {
        if (confirm("Delete this note?")) {
            let notes = JSON.parse(localStorage.getItem('my-github-notes') || '[]');
            notes = notes.filter(n => n.id !== id);
            localStorage.setItem('my-github-notes', JSON.stringify(notes));
            if (currentNoteId === id) createNewNote();
            renderNoteList();
        }
    }

    function exportNotes() {
        const notes = localStorage.getItem('my-github-notes');
        if (!notes || notes === "[]") return alert("No notes to export!");
        const blob = new Blob([notes], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `notes_backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    }
</script>

</body>
</html>
