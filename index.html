<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>James Keller | Journalist</title>

  <meta property="og:title" content="James Keller | National Editor at The Globe and Mail">
  <meta property="og:description" content="National news, politics, and investigative reporting.">
  <meta property="og:image" content="profile2.jpg">
  <meta property="og:url" content="https://jameskeller.ca">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #faf8f4;
      color: #1a1714;
      font-family: 'Source Serif 4', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.5rem;
    }

    .page {
      max-width: 560px;
      width: 100%;
    }

    .rule-top {
      border: none;
      border-top: 3px solid #1a1714;
      margin-bottom: 0.35rem;
    }

    .rule-thin {
      border: none;
      border-top: 1px solid #1a1714;
      margin-bottom: 2rem;
    }

    .dateline {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #5f5a50;
      margin-bottom: 2rem;
      font-family: 'Source Serif 4', serif;
      font-weight: 300;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 140px;
      gap: 2rem;
      align-items: start;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.01em;
      margin-bottom: 0.5rem;
    }

    .title-line {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #5f5a50;
      font-weight: 300;
      margin-bottom: 1.5rem;
    }

    .bio {
      font-size: 1.05rem;
      line-height: 1.72;
      color: #2e2b25;
      font-weight: 300;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 400;
      color: #1a1714;
      padding: 0.6rem 0;
      border-bottom: 0.5px solid #c8c3b8;
      transition: color 0.15s;
      font-family: 'Source Serif 4', serif;
    }

    .link-item:first-child {
      border-top: 0.5px solid #c8c3b8;
    }

    .link-item:hover { color: #5f5a50; }

    .link-arrow {
      font-size: 0.8rem;
      opacity: 0.4;
      margin-left: auto;
      font-style: normal;
    }

    .photo-col {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.6rem;
    }

    .photo-frame {
      width: 130px;
      height: 160px;
      overflow: hidden;
      filter: grayscale(20%) contrast(1.05);
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .photo-caption {
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8c8677;
      text-align: right;
      line-height: 1.5;
      font-weight: 300;
    }

    .rule-bottom {
      border: none;
      border-top: 1px solid #c8c3b8;
      margin-top: 2rem;
      margin-bottom: 0.6rem;
    }

    .footer-line {
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8c8677;
      font-weight: 300;
    }

    @media (max-width: 480px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .photo-col {
        flex-direction: row;
        align-items: flex-start;
      }
      .photo-frame {
        width: 90px;
        height: 112px;
      }
      .photo-caption {
        text-align: left;
      }
      h1 {
        font-size: 2.1rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <hr class="rule-top">
    <hr class="rule-thin">
    <p class="dateline">Toronto, Ontario &nbsp;·&nbsp; Journalism</p>

    <div class="layout">
      <div class="content-col">
        <h1>James<br>Keller</h1>
        <p class="title-line">National Editor &nbsp;·&nbsp; The Globe and Mail</p>
        <p class="bio">I oversee national news, politics, and investigations at The Globe and Mail — Canada's newspaper of record — from Toronto.</p>
        <nav class="links">
          <a class="link-item" href="https://www.theglobeandmail.com/authors/james-keller/" target="_blank">
            Globe and Mail
            <span class="link-arrow">→</span>
          </a>
          <a class="link-item" href="https://www.linkedin.com/in/byjameskeller/" target="_blank">
            LinkedIn
            <span class="link-arrow">→</span>
          </a>
        </nav>
      </div>

      <div class="photo-col">
        <div class="photo-frame">
          <img src="profile2.jpg" alt="James Keller">
        </div>
        <p class="photo-caption">James Keller<br>Toronto</p>
      </div>
    </div>

    <hr class="rule-bottom">
    <p class="footer-line">jameskeller.ca</p>
  </main>
</body>
</html>
